name: Build And Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "electron/**"
      - "services/**"
      - "scripts/**"
      - "local-model/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "electron-builder.yml"
      - "electron-builder.yaml"
      - "electron-builder.json"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  create_tag:
    name: Create Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            TAG="${TAG}-${GITHUB_RUN_ATTEMPT}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: create_tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            dist_cmd: dist:mac
            artifact_pattern: "release/*.dmg"
          - os: windows-latest
            platform: win
            dist_cmd: dist:win
            artifact_pattern: "release/*.exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup sidecar venv (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv services/ai-sidecar/.venv
          services/ai-sidecar/.venv/bin/python -m pip install --upgrade pip
          services/ai-sidecar/.venv/bin/python -m pip install -r services/ai-sidecar/requirements.txt

      - name: Setup sidecar venv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv services/ai-sidecar/.venv
          services/ai-sidecar/.venv/Scripts/python -m pip install --upgrade pip
          services/ai-sidecar/.venv/Scripts/python -m pip install -r services/ai-sidecar/requirements.txt

      - name: Build package
        run: pnpm ${{ matrix.dist_cmd }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - create_tag
      - build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true
          path: release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create_tag.outputs.tag }}
          name: ${{ needs.create_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.exe
