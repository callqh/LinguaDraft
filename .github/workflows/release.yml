name: Build And Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "electron/**"
      - "services/**"
      - "scripts/**"
      - "local-model/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "electron-builder.yml"
      - "electron-builder.yaml"
      - "electron-builder.json"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "vite.config.ts"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  create_tag:
    name: Create Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            TAG="${TAG}-${GITHUB_RUN_ATTEMPT}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: create_tag
    runs-on: ${{ matrix.os }}
    env:
      SMOKE_TEST_WAIT_SECONDS: "15"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            dist_cmd: dist:mac
            artifact_pattern: "release/*.dmg"
          - os: windows-latest
            platform: win
            dist_cmd: dist:win
            artifact_pattern: "release/*.exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup sidecar venv (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv services/ai-sidecar/.venv
          services/ai-sidecar/.venv/bin/python -m pip install --upgrade pip
          services/ai-sidecar/.venv/bin/python -m pip install -r services/ai-sidecar/requirements.txt

      - name: Setup sidecar venv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv services/ai-sidecar/.venv
          services/ai-sidecar/.venv/Scripts/python -m pip install --upgrade pip
          services/ai-sidecar/.venv/Scripts/python -m pip install -r services/ai-sidecar/requirements.txt

      - name: Build package
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm ${{ matrix.dist_cmd }}

      - name: Smoke test packaged app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find release -type d -name '*.app' | head -n 1)"
          if [ -z "${APP_PATH}" ]; then
            echo "No .app bundle found under release/"
            exit 1
          fi

          APP_NAME="$(basename "${APP_PATH}" .app)"
          APP_EXEC="${APP_PATH}/Contents/MacOS/${APP_NAME}"
          if [ ! -x "${APP_EXEC}" ]; then
            echo "Expected executable not found: ${APP_EXEC}"
            exit 1
          fi

          LOG_FILE="$(mktemp "${RUNNER_TEMP:-${TMPDIR:-/tmp}}/linguadraft-mac-smoke.XXXXXX.log")"
          trap 'rm -f "${LOG_FILE}"' EXIT
          "${APP_EXEC}" --no-sandbox --disable-gpu > "${LOG_FILE}" 2>&1 &
          APP_PID=$!
          sleep "${SMOKE_TEST_WAIT_SECONDS}"

          if ! kill -0 "${APP_PID}" 2>/dev/null; then
            cat "${LOG_FILE}"
            echo "Packaged macOS app exited too early"
            exit 1
          fi

          kill "${APP_PID}" || true
          wait "${APP_PID}" || true

      - name: Smoke test packaged app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "release/win-unpacked" -Filter "*.exe" -File |
            Where-Object { $_.Name -notlike "Uninstall*" } |
            Select-Object -First 1

          if (-not $exe) {
            throw "No packaged executable found under release/win-unpacked"
          }

          $stdoutLog = Join-Path $env:RUNNER_TEMP "linguadraft-win-smoke.stdout.log"
          $stderrLog = Join-Path $env:RUNNER_TEMP "linguadraft-win-smoke.stderr.log"
          $process = Start-Process -FilePath $exe.FullName -ArgumentList "--no-sandbox", "--disable-gpu" -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog -PassThru
          Start-Sleep -Seconds ([int]$env:SMOKE_TEST_WAIT_SECONDS)

          if ($process.HasExited) {
            if (Test-Path $stdoutLog) { Get-Content $stdoutLog }
            if (Test-Path $stderrLog) { Get-Content $stderrLog }
            throw "Packaged Windows app exited too early with code $($process.ExitCode)"
          }

          Stop-Process -Id $process.Id -Force
          Wait-Process -Id $process.Id -ErrorAction SilentlyContinue

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.platform }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - create_tag
      - build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true
          path: release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create_tag.outputs.tag }}
          name: ${{ needs.create_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.exe
